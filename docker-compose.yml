version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ktu_user
      POSTGRES_PASSWORD: ktu_password
      POSTGRES_DB: academic_intel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://ktu_user:ktu_password@db:5432/academic_intel
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8010:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend_new
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
